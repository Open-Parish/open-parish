---
name: "Development Workflow"

'on':
  push:
    branches:
      - development

jobs:
  ci:
    name: "Integration"
    runs-on: "ubuntu-latest"
    steps:
      - name: "Checkout Code"
        uses: "actions/checkout@v2"

      - name: "Lint code"
        run: |
              npm ci
              npm run lint

