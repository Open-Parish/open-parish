name: Deploy API and Dashboard

on:
  push:
    branches:
      - main
    paths:
      - 'api/**'
      - 'dashboard/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-api:
    name: Deploy API (Cloudflare Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Apply D1 migrations (remote)
        run: npx wrangler d1 migrations apply olshp --remote

      - name: Deploy Worker
        run: npx wrangler deploy

  deploy-dashboard:
    name: Deploy Dashboard (Cloudflare Pages)
    runs-on: ubuntu-latest
    needs: deploy-api
    defaults:
      run:
        working-directory: dashboard
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Deploy to Cloudflare Pages
        run: npx wrangler pages deploy dist --project-name "${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}"
