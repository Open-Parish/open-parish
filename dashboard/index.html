<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Parish</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes oc-stroke {
          0% {
            stroke-dashoffset: 150;
          }
          50% {
            stroke-dashoffset: 0;
          }
          100% {
            stroke-dashoffset: -150;
          }
        }
        @keyframes oc-check {
          0%,
          40% {
            stroke-dashoffset: 30;
            opacity: 0;
          }
          60% {
            stroke-dashoffset: 0;
            opacity: 1;
          }
          80% {
            stroke-dashoffset: 0;
            opacity: 1;
          }
          100% {
            stroke-dashoffset: 30;
            opacity: 0;
          }
        }
        @keyframes oc-fade {
          0%,
          100% {
            opacity: 0.4;
          }
          50% {
            opacity: 1;
          }
        }
        .oc-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #fff;
          font-family: 'Inter', sans-serif;
          gap: 16px;
        }
        .oc-loader svg {
          width: 56px;
          height: 56px;
        }
        .oc-shield {
          fill: none;
          stroke: #12b886;
          stroke-width: 2;
          stroke-linecap: round;
          stroke-linejoin: round;
          stroke-dasharray: 150;
          animation: oc-stroke 2s ease-in-out infinite;
        }
        .oc-check {
          fill: none;
          stroke: #12b886;
          stroke-width: 2.5;
          stroke-linecap: round;
          stroke-linejoin: round;
          stroke-dasharray: 30;
          animation: oc-check 2s ease-in-out infinite;
        }
        .oc-loader-text {
          font-size: 13px;
          font-weight: 500;
          color: #868e96;
          letter-spacing: 0.02em;
          animation: oc-fade 2s ease-in-out infinite;
        }
      </style>
      <div class="oc-loader">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path class="oc-shield" d="M12 2l7 3.5v5c0 4.5-3 8.5-7 10-4-1.5-7-5.5-7-10v-5L12 2z" />
          <path class="oc-check" d="M8.5 12.5l2.5 2.5 4.5-5" />
        </svg>
        <span class="oc-loader-text">Loading&hellip;</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
