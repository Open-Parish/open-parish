<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Open Parish</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root">
      <style>
        @keyframes oc-pulse {
          0% {
            transform: scale(1);
            opacity: 0.85;
          }
          60% {
            transform: scale(1.05);
            opacity: 1;
          }
          100% {
            transform: scale(1);
            opacity: 0.85;
          }
        }
        @keyframes oc-fade {
          0%,
          100% {
            opacity: 0.4;
          }
          50% {
            opacity: 1;
          }
        }
        .oc-loader {
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: #fff;
          font-family: 'DM Sans', system-ui, sans-serif;
          gap: 16px;
        }
        .oc-loader svg {
          width: 60px;
          height: 60px;
          color: #c9a157;
          animation: oc-pulse 1.2s ease-in-out infinite;
        }
        .oc-loader-text {
          font-size: 13px;
          font-weight: 600;
          color: #868e96;
          letter-spacing: 0.02em;
          animation: oc-fade 2s ease-in-out infinite;
        }
      </style>
      <div class="oc-loader">
        <svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none" aria-hidden="true">
          <rect x="4" y="4" width="32" height="32" rx="9" fill="currentColor" opacity="0.15" />
          <path d="M20 8v6M17 11h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          <path d="M10 18.5l10-7 10 7v12a1.5 1.5 0 0 1-1.5 1.5h-17A1.5 1.5 0 0 1 10 30.5v-12z" fill="currentColor" />
          <path d="M14 23.5a6 6 0 1 1 12 0v8h-12v-8z" fill="white" />
          <path d="M20 22.5v9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" opacity="0.18" />
          <circle cx="20" cy="26.8" r="0.8" fill="currentColor" opacity="0.55" />
        </svg>
        <span class="oc-loader-text">Loading&hellip;</span>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
